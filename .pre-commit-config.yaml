repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: Pyright Strict Type Checking
        entry: podman exec vb-api python -m pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-coverage
        name: Pytest & Code Coverage
        # Runs against a dedicated vb_test database, never the real dev DB
        # — see scripts/run_pytest.sh and "Running tests" in README.md.
        entry: podman exec vb-api sh scripts/run_pytest.sh
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
