name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.lock
      - name: Check code style (Ruff)
        run: ruff check --output-format github .
      - name: Check formatting (Ruff)
        run: ruff format --check .

  quality:
    name: Typecheck, Migrations & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      SECRET_KEY: ci-test-secret-key-minimum-32-chars!!
      APP_ENVIRONMENT: test
      S3_ENDPOINT_URL: https://s3.amazonaws.com
      S3_ACCESS_KEY: testing
      S3_SECRET_KEY: testing
      S3_BUCKET: test-bucket
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies (for Cairo/PDF)
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libcairo2
      - name: Install Python dependencies
        run: uv pip install --system -r requirements-dev.lock
      - name: Run Pyright (Strict Type Checking)
        run: pyright
      - name: Run Database Migrations
        run: alembic upgrade head
      - name: Run Test Suite & Coverage
        run: pytest --tb=short -q

  security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4

  release-image:
    name: Build & Push Image
    needs: [lint, quality, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/k-o-st-v-vindobona-ii/vb-api:latest
            ghcr.io/k-o-st-v-vindobona-ii/vb-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
