# Unified CI/CD Pipeline for Vindobona API
# Handles Linting, Testing, Security Scanning, and Deployment via GitHub Releases.

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs CodeQL automatically every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI
  release:
    # Trigger 1: This listens specifically to the "Publish release" button in GitHub
    types: [published]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.lock
      - name: Check code style (Ruff)
        run: ruff check --output-format github .
      - name: Check formatting (Ruff)
        run: ruff format --check .

  quality:
    name: Typecheck, Migrations & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      SECRET_KEY: ci-test-secret-key-minimum-32-chars!!
      APP_ENVIRONMENT: test
      S3_ENDPOINT_URL: https://s3.amazonaws.com
      S3_ACCESS_KEY: testing
      S3_SECRET_KEY: testing
      S3_BUCKET: test-bucket
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies (for Cairo/PDF)
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libcairo2
      - name: Install Python dependencies
        run: uv pip install --system -r requirements-dev.lock
      - name: Run Pyright (Strict Type Checking)
        run: pyright
      - name: Run Database Migrations
        run: alembic upgrade head
      - name: Run Test Suite & Coverage
        run: pytest --tb=short -q

  security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3

  release-image:
    name: Build & Push Image
    needs: [lint, quality, security]
    runs-on: ubuntu-latest
    # Trigger 2 (Die Weiche): Der Job startet NUR, wenn ein Release publiziert wurde 
    # ODER du manuell auf "Run workflow" geklickt hast. 
    # Bei einem normalen Push auf main ist hier Endstation!
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          # Trigger 3: Wir vergeben jetzt 3 Tags (latest, den Git-Hash und den Release-Namen)
          tags: |
            ghcr.io/k-o-st-v-vindobona-ii/vb-api:latest
            ghcr.io/k-o-st-v-vindobona-ii/vb-api:sha-${{ github.sha }}
            ghcr.io/k-o-st-v-vindobona-ii/vb-api:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max